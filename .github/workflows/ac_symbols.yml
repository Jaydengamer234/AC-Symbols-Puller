name: AC Symbol Puller

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download DepotDownloader
      run: |
        wget https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip -O depot.zip
        unzip depot.zip -d depot

    - name: Download Animal Company depot (auto manifest)
      run: |
        chmod +x depot/DepotDownloader
        depot/DepotDownloader \
          -app 4551040 \
          -depot 4551041 \
          -username "${{ secrets.STEAM_USER }}" \
          -password "${{ secrets.STEAM_PASS }}" \
          -dir downloaded

    - name: Extract required files
      run: |
        mkdir -p gamefiles
        cp downloaded/**/*UnityPlayer.dll gamefiles/ || true
        cp downloaded/**/*globalgamemanagers gamefiles/ || true

    - name: Install Python deps
      run: pip install -r requirements.txt || true

    - name: Run symbol puller
      run: python symbols_puller.py

    - name: Commit & push results
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add .
        git commit -m "Auto-update symbols" || true
        git push || true
        
    - name: Commit output
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add SymbolMap.json Frida-Map.js
        git commit -m "Update symbols" || echo "No changes"
        git push

