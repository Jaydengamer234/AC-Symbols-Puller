name: AC Symbol Puller

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download DepotDownloader
      run: |
        wget https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip -O depot.zip
        unzip depot.zip -d depot

    - name: Download depot files
      run: |
        dotnet depot/DepotDownloader.dll \
          -app 813780 \
          -depot 4551041 \
          -manifest 7419120047354550096 \
          -username "${{ secrets.STEAM_USER }}" \
          -password "${{ secrets.STEAM_PASS }}" \
          -dir downloaded

    - name: Copy required files
      run: |
        mkdir -p gamefiles
        cp downloaded/**/*UnityPlayer.dll gamefiles/ || true
        cp downloaded/**/*globalgamemanagers gamefiles/ || true

    - name: Install Python deps
      run: pip install -r requirements.txt || true

    - name: Run symbol puller
      run: python symbols_puller.py

    - name: Commit & push results
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add .
        git commit -m "Auto-update symbols" || true
        git push || true
